name: fitkarma
description: "FitKarma - Health & Fitness Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.1.0

  # Backend
  appwrite: ^23.0.0

  # Environment
  flutter_dotenv: ^6.0.0

  # Database (Drift + SQLite)
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlcipher_flutter_libs: ^0.7.0+eol

  # Cryptography
  cryptography: ^2.9.0
  crypto: ^3.0.3

  # HTTP Client with cert pinning
  dio: ^5.4.0

  # Secure Storage for encryption keys
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.0
  device_info_plus: ^12.4.0

  # Biometric Authentication
  local_auth: ^2.3.0

  # Home Screen Widgets
  home_widget: ^0.9.0

  # Offline Map Tiles
  flutter_map_tile_caching: 10.0.0

  # Barcode Scanner
  flutter_barcode_scanner: ^2.0.0
  mobile_scanner: ^6.0.0

  # ML Kit (OCR & Image Labeling)
  google_mlkit_barcode_scanning: ^0.13.0
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_image_labeling: 0.13.0

  # Speech Recognition
  speech_to_text: ^7.0.0

  # HTTP for API calls
  http: ^1.2.0

  # Health Connect / HealthKit
  health: 13.3.1

  # Pedometer fallback
  pedometer: ^4.0.1

  # Background tasks
  workmanager: ^0.5.2

  # Maps & GPS
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # YouTube Player
  youtube_player_flutter: ^8.1.2

  # Audio for rest timer chime
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.13.1
  drift_dev: ^2.32.1

flutter:
  uses-material-design: true

  assets:
    - .env
