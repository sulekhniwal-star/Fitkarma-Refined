name: fitkarma
description: "FitKarma - Health & Fitness Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.1.0

  # Backend
  appwrite: ^23.0.0

  # Environment
  flutter_dotenv: ^6.0.0

  # Database (Drift + SQLite)
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlcipher_flutter_libs: ^0.7.0+eol

  # Cryptography
  cryptography: ^2.9.0
  crypto: ^3.0.3

  # HTTP Client with cert pinning
  dio: ^5.4.0

  # Secure Storage for encryption keys
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.0
  device_info_plus: ^12.4.0

  # Biometric Authentication
  local_auth: ^2.3.0

  # Home Screen Widgets
  home_widget: ^0.9.0

  # Offline Map Tiles
  flutter_map_tile_caching: ^10.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.13.1
  drift_dev: ^2.32.1

flutter:
  uses-material-design: true

  assets:
    - .env
