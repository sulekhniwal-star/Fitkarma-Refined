name: fitkarma
description: Offline-first health tracking for India
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & Navigation
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.2

  # Local Database
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # Encryption
  flutter_secure_storage: ^10.0.0
  sqflite_sqlcipher: ^3.0.1+2

  # Backend
  appwrite: ^23.1.0

  # Network
  dio: ^5.6.0
  connectivity_plus: ^7.1.1
  cached_network_image: ^3.3.1

  # Animations
  lottie: ^3.1.2
  rive: ^0.14.6
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^1.2.0

  # Health
  health: ^13.3.1
  local_auth: ^3.0.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^11.0.2      # For lab report PDF upload

  # Device
  device_info_plus: ^12.4.0

  # Maps (GPS workouts)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Rich text (Journal)
  flutter_quill: ^11.5.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3

  # Home widgets
  home_widget: ^0.9.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  collection: ^1.18.0     # for .average extension

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.3
  drift_dev: ^2.19.1
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/rive/
    - assets/fonts/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans[wght].ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono[wght].ttf
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.ttf
