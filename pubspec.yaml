name: fitkarma
description: "Fitkarma — fitness & wellness companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.1.0

  # Backend — Appwrite
  appwrite: ^23.0.0

  # Environment variables
  flutter_dotenv: ^6.0.0

  # HTTP client
  http: ^1.6.0
  dio: ^5.4.3

  # Local storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Database — Drift (SQLite)
  drift: ^2.32.1
  drift_flutter: ^0.3.0

  # Home screen widgets
  home_widget: ^0.9.0

  # Offline map tiles
  flutter_map_tile_caching: ^10.1.1

  # Cryptography (HKDF key derivation)
  cryptography: ^2.9.0

  # Security — root/jailbreak detection
  flutter_jailbreak_detection: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
